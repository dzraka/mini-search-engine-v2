<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Search Engine</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="flex h-screen bg-[#f7f9fb] overflow-hidden font-sans">
    <aside class="w-75 bg-white flex flex-col z-10 h-full flex-shrink-0 shadow-md">
      <div class="p-6 text-center">
        <h1 class="text-xl text-[#004ac6] font-bold tracking-tight">Mini Search Engine</h1>
      </div>

      <nav class="flex-1 px-4 space-y-8 mt-4 overflow-y-auto">
        <div>
          <h2 class="text-xs font-bold text-slate-400 tracking-widest mb-3 px-3">Menu Utama</h2>
          <ul class="space-y-3">
            <li>
              <button id="tfidf-btn" class="w-full text-left px-5 py-3 rounded-2xl font-semibold text-sm transition-all bg-[#004ac6]/90 text-white shadow-md shadow-blue-300">TF-IDF Search</button>
            </li>
            <li>
              <button id="semantic-btn" class="w-full text-left px-5 py-3 rounded-2xl font-semibold text-sm transition-all text-slate-600 hover:bg-slate-200/50 hover:text-slate-900 hover:cursor-pointer">Semantic Search</button>
            </li>
          </ul>
        </div>

        <div>
          <h2 class="text-xs font-bold text-slate-400 tracking-widest mb-3 px-3">Analisis</h2>
          <ul class="space-y-1.5">
            <li>
              <button id="evaluate-btn" class="w-full text-left px-5 py-3 rounded-2xl font-semibold text-sm transition-all text-slate-600 hover:bg-slate-200/50 hover:text-slate-900 hover:cursor-pointer">Hasil Evaluasi</button>
            </li>
          </ul>
        </div>
      </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full relative overflow-y-auto w-full">
      <div class="w-full p-8 pt-10 flex justify-center sticky top-0 z-20">
        <div class="flex w-full max-w-3xl items-center rounded-full border border-gray-300 bg-white/20 backdrop-blur-sm px-4 py-2 shadow-md relative focus-within:ring-2 focus-within:ring-blue-500">
          <div class="flex h-8 w-8 items-center justify-center rounded-full bg-slate-100">
            <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
          </div>

          <input type="search" id="search-input" class="flex-1 bg-transparent px-3 outline-none" placeholder="Cari komentar..." autocomplete="off" />

          <button id="search-btn" class="rounded-full bg-[#004ac6]/90 px-5 py-2 text-white hover:bg-[#004ac6] hover:cursor-pointer">Search</button>
        </div>
      </div>

      <div class="flex-1 px-8 pb-12 w-full max-w-4xl mx-auto">
        <div id="result-info" class="text-slate-500 font-medium mb-6 text-sm ml-2"></div>

        <div id="results" class="space-y-4"></div>
        <div id="evaluate-results" style="display: none"></div>
      </div>

      <div id="pagination" class="mt-10 mb-8"></div>
    </main>

    <script src="/static/script.js"></script>
  </body>
</html>
